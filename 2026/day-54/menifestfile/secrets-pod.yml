apiVersion: v1
kind: Pod
metadata:
  name: secrets-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.28
      command: ["/bin/sh", "-c", "env && sleep 3600"]
      env: 
        - name: secrets-map
          valueFrom:
            secretKeyRef:
               name: db-credentials
               key: DB_USER
      volumeMounts:
        - name: secrete-volume
          mountPath: /etc/db-credentials
          readOnly: true
  volumes:
    - name: secrete-volume
      secret:
        secretName: db-credentials