apiVersion: v1
kind: Pod
metadata:
  name: live-config-pod
spec:
  containers:
  - name: busybox
    image: busybox
    command:
      - sh
      - -c
      - |
        while true; do
          echo "Message: $(cat /etc/config/message)";
          sleep 5;
        done
    volumeMounts:
      - name: config-volume
        mountPath: /etc/config

  volumes:
    - name: config-volume
      configMap:
        name: live-config