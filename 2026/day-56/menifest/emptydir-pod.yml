apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
spec:
  containers:
  - name: writer
    image: busybox
    command:
      - sh
      - -c
      - |
        while true; do
          date >> /data/message.txt;
          sleep 5;
        done
    volumeMounts:
      - name: data-volume
        mountPath: /data

  volumes:
    - name: data-volume
      emptyDir: {}